name: "probe Pointer Cloudflare"

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      # Each probe reports its status, whether Cloudflare issued a managed
      # challenge, and whether the page contains archive links.  They are
      # intentionally allowed to fail independently, so one failed technique
      # does not hide the results of the others.
      - name: Probe httpx default headers
        continue-on-error: true
        run: |
          uv run python - <<'PY'
          import httpx

          response = httpx.get("https://www.pointer.io/archives/", follow_redirects=True, timeout=30)
          print(f"status={response.status_code}")
          print(f"cf_mitigated={response.headers.get('Cf-Mitigated')}")
          print(f"archive_links={response.text.count('/archives/')}")
          response.raise_for_status()
          PY

      - name: Probe httpx browser headers
        continue-on-error: true
        run: |
          uv run python - <<'PY'
          import httpx

          headers = {
              "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8",
              "Accept-Language": "en-US,en;q=0.9",
              "User-Agent": "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/136.0.0.0 Safari/537.36",
          }
          response = httpx.get(
              "https://www.pointer.io/archives/",
              follow_redirects=True,
              headers=headers,
              timeout=30,
          )
          print(f"status={response.status_code}")
          print(f"cf_mitigated={response.headers.get('Cf-Mitigated')}")
          print(f"archive_links={response.text.count('/archives/')}")
          response.raise_for_status()
          PY

      - name: Probe curl
        continue-on-error: true
        run: |
          curl --fail --location --silent --show-error --max-time 30 \
            --dump-header headers.txt --output archive.html \
            --user-agent 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/136.0.0.0 Safari/537.36' \
            https://www.pointer.io/archives/
          rg -i '^(HTTP/|cf-mitigated:|cf-ray:|server:)' headers.txt
          printf 'archive_links='
          rg --count '/archives/' archive.html

      - name: Install Chromium for browser probe
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Probe Chromium browser navigation
        continue-on-error: true
        run: |
          node - <<'NODE'
          const { chromium } = require("playwright");

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage({ locale: "en-US" });
            const response = await page.goto("https://www.pointer.io/archives/", {
              timeout: 60_000,
              waitUntil: "networkidle",
            });
            await page.waitForTimeout(5_000);
            console.log(`initial_status=${response?.status()}`);
            console.log(`final_url=${page.url()}`);
            console.log(`archive_links=${await page.locator("a[href^='/archives/']").count()}`);
            console.log(`challenge_text=${await page.getByText("Just a moment...").count()}`);
            await browser.close();
          })().catch((error) => {
            console.error(error);
            process.exitCode = 1;
          });
          NODE
