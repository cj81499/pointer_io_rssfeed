name: "update rss"

on:
  schedule:
    # https://crontab.guru/#0_0_*_*_*
    # At 00:00 (UTC)
    - cron: "0 0 * * *"

  workflow_dispatch: # allow manually running
    inputs:
      log_level:
        type: choice
        options:
          - NOTSET
          - DEBUG
          - INFO
          - WARNING
          - ERROR
        default: INFO
      publish:
        type: boolean
        default: false

# ensure at most one publish job runs at a time
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  FORCE_COLOR: 1

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: astral-sh/setup-uv@b5f58b2abc5763ade55e4e9d0fe52cd1ff7979ca # v5.2.1
        with:
          enable-cache: true

      - name: Restore pointer HTML cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .cache/pointer
          key: pointer-html-v1-${{ runner.os }}
          restore-keys: |
            pointer-html-v1-

      - name: build rss feed
        env:
          LOG_LEVEL: ${{ inputs.log_level }}
        run: |
          mkdir _site
          uv run pointer-io-rssfeed > _site/feed.xml

      - name: Upload static files as artifact
        if: ${{ github.event_name == 'schedule' || inputs.publish == true }}
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        id: deployment
        with:
          path: _site/

  deploy:
    # deploy if running on schedule or the publish flag is set
    if: ${{ github.event_name == 'schedule' || inputs.publish == true }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write # to deploy to Pages
      id-token: write # to verify the deployment originates from an appropriate source
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
        id: deployment
